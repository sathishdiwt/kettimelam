<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surface:#161921;--card:#1c2030;--border:#ffffff12;
  --text:#f0f2f7;--muted:#7a8099;--hint:#3e4358;
  --orange:#ff6b35;--orange-dim:#ff6b3520;
  --blue:#4a9eff;--blue-dim:#4a9eff18;
  --pink:#ff4d8d;--pink-dim:#ff4d8d18;
  --green:#3de68a;--green-dim:#3de68a18;
  --amber:#ffbe3d;--amber-dim:#ffbe3d18;
  --purple:#a78bfa;--purple-dim:#a78bfa18;
  --red:#ff5c5c;--red-dim:#ff5c5c18;
  --teal:#2dd4bf;--teal-dim:#2dd4bf18;
  --r:10px;--rl:16px;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px;line-height:1.5}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}
.wrap{max-width:1200px;margin:0 auto;padding:2rem 1.25rem;position:relative;z-index:1}
.eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:6px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,3.6rem);letter-spacing:.04em;line-height:1;color:var(--text)}
h1 span{color:var(--orange)}
.subtitle{color:var(--muted);font-size:13px;margin-top:6px}
.gen-time{font-size:11px;color:var(--hint);margin-top:3px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:2rem 0 1.5rem}
.metric{background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;overflow:hidden;position:relative}
.metric::after{content:'';position:absolute;inset:0;background:var(--ac-dim);pointer-events:none}
.metric-val{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:.04em;color:var(--ac);display:block;line-height:1}
.metric-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-top:3px}
.charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:1.5rem}
.chart-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:1.1rem}
.chart-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;margin-bottom:.9rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-lbl{font-size:12px;color:var(--text);min-width:56px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#ffffff0d;border-radius:4px;height:9px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-n{font-size:12px;color:var(--muted);min-width:18px;text-align:right}
.filters{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:1rem 1.25rem;margin-bottom:1.25rem}
.frow{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:7px}
.frow:last-child{margin-bottom:0}
.flabel{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600;min-width:72px}
.fbtn{border:0.5px solid var(--border);background:transparent;color:var(--muted);padding:3px 11px;border-radius:100px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all .15s;line-height:1.6}
.fbtn:hover{border-color:#ffffff28;color:var(--text)}
.fbtn.on{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
.clrbtn{margin-left:auto;border:0.5px solid var(--border);background:transparent;color:var(--muted);padding:3px 11px;border-radius:100px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all .15s;line-height:1.6}
.clrbtn:hover{color:var(--orange);border-color:var(--orange)}
.search-wrap{margin-bottom:1.25rem;position:relative}
.search-wrap input{width:100%;background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 14px 9px 36px;outline:none;transition:border-color .15s}
.search-wrap input:focus{border-color:#ffffff30}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none}
.tbl-wrap{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:2rem}
.tbl-header{padding:.7rem 1.25rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem}
.tbl-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:600}
.tbl-count{font-size:11px;color:var(--muted)}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:9px 12px;text-align:left;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;position:sticky;top:0;background:var(--card);z-index:2}
th:hover{color:var(--text)}
th .sort-icon{margin-left:4px;opacity:.4;font-size:9px}
th.sorted .sort-icon{opacity:1;color:var(--orange)}
td{padding:9px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle;color:var(--text);max-width:200px;overflow:hidden;text-overflow:ellipsis}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#ffffff04}
td.wrap-cell{white-space:normal;word-break:break-word;max-width:180px}
.no-result{text-align:center;padding:3rem;color:var(--muted);font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;white-space:nowrap}
.bm{background:var(--blue-dim);color:var(--blue)}
.bf{background:var(--pink-dim);color:var(--pink)}
.ba{background:var(--green-dim);color:var(--green)}
.bk{background:var(--amber-dim);color:var(--amber)}
.bs{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.05em;background:#ffffff0d;color:var(--text);padding:1px 7px}
.bmed-no{background:var(--green-dim);color:var(--green)}
.bmed-yes{background:var(--red-dim);color:var(--red)}
.bmed-norm{background:var(--teal-dim);color:var(--teal)}
.bpay{display:inline-flex;align-items:center;gap:4px;background:var(--orange-dim);color:var(--orange);padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;text-decoration:none;cursor:pointer}
.bpay:hover{background:var(--orange);color:#fff}
.b-bg{background:var(--purple-dim);color:var(--purple)}
.modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:100;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--rl);max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.modal-head{padding:1.25rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-name{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.04em}
.modal-close{background:transparent;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px 8px;border-radius:6px}
.modal-close:hover{color:var(--text);background:var(--hint)}
.modal-body{padding:1.25rem 1.5rem}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{background:var(--card);border-radius:var(--r);padding:.75rem}
.detail-item.full{grid-column:1/-1}
.detail-key{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:4px}
.detail-val{font-size:13px;color:var(--text);word-break:break-word}
footer{text-align:center;font-size:11px;color:var(--muted);padding-bottom:2rem}
footer span{color:var(--orange)}
@media(max-width:640px){.detail-grid{grid-template-columns:1fr}.charts-row{grid-template-columns:1fr}}
</style>
</head>

let filters = {gender:"All",category:"All",tshirt:"All",blood:"All"};
let sortKey = "ts", sortDir = 1;

document.getElementById("genTime").textContent = "Generated: " + new Date().toLocaleString('en-IN',{dateStyle:'medium',timeStyle:'short'});

function cnt(arr,k){return arr.reduce((a,r)=>{a[r[k]]=(a[r[k]]||0)+1;return a;},{})}

function medBadge(m){
  const v=(m||"").toLowerCase().trim();
  if(!v||v==="no"||v==="nil"||v==="none"||v==="noo") return `<span class="badge bmed-no">None</span>`;
  if(["normal","good","full fit","alright","fit","ok","fitt"].includes(v)) return `<span class="badge bmed-norm">${m}</span>`;
  return `<span class="badge bmed-yes">${m}</span>`;
}

function filtered(){
  const q = document.getElementById("searchBox").value.toLowerCase().trim();
  return DATA.filter(r=>{
    if(filters.gender!=="All" && r.gender!==filters.gender) return false;
    if(filters.category!=="All" && r.category!==filters.category) return false;
    if(filters.tshirt!=="All" && r.tshirt!==filters.tshirt) return false;
    if(filters.blood!=="All" && r.blood!==filters.blood) return false;
    if(q && !JSON.stringify(r).toLowerCase().includes(q)) return false;
    return true;
  }).sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    if(sortKey==="age"){va=+va;vb=+vb;}
    if(va<vb) return -sortDir; if(va>vb) return sortDir; return 0;
  });
}

function setFilter(k,v){
  filters[k]=v;
  document.querySelectorAll(`.frow[data-key="${k}"] .fbtn`).forEach(b=>b.classList.toggle('on',b.dataset.val===v));
  document.getElementById('clrBtn').style.display=Object.values(filters).some(x=>x!=='All')?'':'none';
  render();
}

function clearFilters(){
  Object.keys(filters).forEach(k=>filters[k]='All');
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('on',b.dataset.val==='All'));
  document.getElementById('clrBtn').style.display='none';
  render();
}

function setSort(k){
  if(sortKey===k) sortDir*=-1; else{sortKey=k;sortDir=1;}
  render();
}

function openDetail(i){

  document.getElementById("modalBody").innerHTML=`

function closeModal(e){
  if(e && e.target!==document.getElementById("modalOverlay")) return;
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal({target:document.getElementById("modalOverlay")})});

  const brows=(items,counts,maxV,colorFn)=>items.map(l=>`
    <div class="bar-row">
      <span class="bar-lbl" title="${l}">${l}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round((counts[l]||0)/maxV*100)}%;background:${colorFn(l)}"></div></div>
      <span class="bar-n">${counts[l]||0}</span>
    </div>`).join('');

  const existSizes = SIZES.filter(s=>allTC[s]);
  const existBloods = BLOOD_UNIQUE.filter(b=>allBC[b]);

  document.getElementById('charts').innerHTML=`
    <div class="chart-card"><div class="chart-title">Gender</div>${brows(['Male','Female'],gc,maxG,l=>l==='Male'?'#4a9eff':'#ff4d8d')}</div>
    <div class="chart-card"><div class="chart-title">Category</div>${brows(['Adult','Kids'],cc,maxC,l=>l==='Adult'?'#3de68a':'#ffbe3d')}</div>
    <div class="chart-card"><div class="chart-title">T-shirt size</div>${brows(existSizes,tc,maxT,l=>SIZE_C[l]||'#888')}</div>
    <div class="chart-card"><div class="chart-title">Blood group</div>${brows(existBloods,bc,maxB,l=>BLOOD_C[l]||'#888')}</div>`;

  const mkRow=(key,label,opts)=>`
    <div class="frow" data-key="${key}">
      <span class="flabel">${label}</span>
      ${['All',...opts].map(o=>`<button class="fbtn${filters[key]===o?' on':''}" data-val="${o}" onclick="setFilter('${key}','${o}')">${o}</button>`).join('')}
    </div>`;
  document.getElementById('filters').innerHTML=
    mkRow('gender','Gender',['Male','Female'])+
    mkRow('category','Category',['Adult','Kids'])+
    mkRow('tshirt','T-Shirt',existSizes)+
    mkRow('blood','Blood',existBloods)+
    `<div style="text-align:right;margin-top:6px"><button class="clrbtn" id="clrBtn" style="display:${Object.values(filters).some(x=>x!=='All')?'':'none'}" onclick="clearFilters()">✕ Clear all filters</button></div>`;

  const cols=[
    {k:'ts',l:'Timestamp'},{k:'name',l:'Name'},{k:'age',l:'Age'},{k:'gender',l:'Gender'},
    {k:'blood',l:'Blood'},{k:'whatsapp',l:'WhatsApp'},{k:'emergency',l:'Emergency'},
    {k:'email',l:'Email'},{k:'address',l:'Address'},{k:'category',l:'Category'},
    {k:'distance',l:'Distance'},{k:'tshirt',l:'T-Shirt'},{k:'medical',l:'Medical'},
    {k:'payment',l:'Payment'},{k:'_detail',l:'Detail'},
  ];
  document.getElementById('thead').innerHTML=cols.map(c=>
    c.k==='_detail'?`<th></th>`:`<th class="${sortKey===c.k?'sorted':''}" onclick="setSort('${c.k}')">${c.l}<span class="sort-icon">${sortKey===c.k?(sortDir===1?'▲':'▼'):'⇅'}</span></th>`
  ).join('');

  document.getElementById('tblCount').textContent=`${total} of ${DATA.length} participants`;
  document.getElementById('tbody').innerHTML=d.length?d.map(r=>{
    const i=DATA.indexOf(r);
    return `<tr>
      <td style="color:var(--muted);font-size:11px">${r.ts}</td>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.age}</td>
      <td><span class="badge ${r.gender==='Male'?'bm':'bf'}">${r.gender}</span></td>
      <td><span class="badge b-bg">${r.blood}</span></td>
      <td style="font-family:monospace;font-size:12px">${r.whatsapp}</td>
      <td style="font-family:monospace;font-size:12px">${r.emergency}</td>
      <td class="wrap-cell" style="font-size:11px;color:var(--muted)">${r.email}</td>
      <td class="wrap-cell" style="font-size:11px;color:var(--muted)">${r.address}</td>
      <td><span class="badge ${r.category==='Adult'?'ba':'bk'}">${r.category}</span></td>
      <td style="color:var(--muted)">${r.distance}</td>
      <td><span class="badge bs">${r.tshirt}</span></td>
      <td>${medBadge(r.medical)}</td>
      <td><a class="bpay" href="${r.payment}" target="_blank">&#x1F4C4; View</a></td>
      <td><button onclick="openDetail(${i})" style="background:transparent;border:0.5px solid var(--border);color:var(--muted);padding:3px 10px;border-radius:100px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Details</button></td>
    </tr>`;
  }).join(''):`<tr><td colspan="15" class="no-result">No participants match the selected filters</td></tr>`;
}

render();
</script>
</body>
</html>
