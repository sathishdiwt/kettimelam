<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Marathon Fest'26 — Registration Report</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0f14;
    --surface:#161921;
    --card:#1c2030;
    --border:#ffffff12;
    --text:#f0f2f7;
    --muted:#7a8099;
    --orange:#ff6b35;
    --orange-dim:#ff6b3522;
    --blue:#4a9eff;
    --blue-dim:#4a9eff18;
    --pink:#ff4d8d;
    --pink-dim:#ff4d8d18;
    --green:#3de68a;
    --green-dim:#3de68a18;
    --amber:#ffbe3d;
    --amber-dim:#ffbe3d18;
    --purple:#a78bfa;
    --purple-dim:#a78bfa18;
    --radius:10px;
    --radius-lg:16px;
  }
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;font-size:14px}

  /* noise texture */
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0}

  .wrap{max-width:1000px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:1}

  /* header */
  header{margin-bottom:2.5rem}
  .eyebrow{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:6px}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.4rem,6vw,4rem);letter-spacing:0.04em;line-height:1;color:var(--text)}
  h1 span{color:var(--orange)}
  .subtitle{color:var(--muted);font-size:13px;margin-top:8px}
  .last-update{font-size:11px;color:var(--muted);margin-top:4px}

  /* metric cards */
  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:2rem}
  .metric{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;position:relative;overflow:hidden}
  .metric::after{content:'';position:absolute;inset:0;background:var(--accent-dim);pointer-events:none}
  .metric-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:0.04em;color:var(--accent);display:block;line-height:1}
  .metric-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:4px}

  /* charts row */
  .charts-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-bottom:2rem}
  .chart-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
  .chart-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-weight:600;margin-bottom:1rem}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .bar-label{font-size:12px;color:var(--text);min-width:60px;white-space:nowrap}
  .bar-track{flex:1;background:#ffffff0d;border-radius:4px;height:10px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
  .bar-count{font-size:12px;color:var(--muted);min-width:20px;text-align:right}

  /* filters */
  .filters-wrap{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.5rem}
  .filter-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:6px}
  .filter-row:last-child{margin-bottom:0}
  .filter-label{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-weight:600;min-width:70px}
  .fbtn{border:0.5px solid var(--border);background:transparent;color:var(--muted);padding:4px 12px;border-radius:100px;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;transition:all 0.15s}
  .fbtn:hover{border-color:#ffffff30;color:var(--text)}
  .fbtn.on{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600}
  .clear-btn{margin-left:auto;border:0.5px solid var(--border);background:transparent;color:var(--muted);padding:4px 12px;border-radius:100px;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;transition:all 0.15s}
  .clear-btn:hover{color:var(--orange);border-color:var(--orange)}

  /* table */
  .table-wrap{background:var(--card);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .table-header{padding:.75rem 1.25rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .table-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-weight:600}
  .table-count{font-size:11px;color:var(--muted)}
  .tbl-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  th{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);padding:10px 14px;text-align:left;border-bottom:0.5px solid var(--border);white-space:nowrap}
  td{padding:10px 14px;border-bottom:0.5px solid var(--border);vertical-align:middle;font-size:13px;color:var(--text)}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover td{background:#ffffff04}
  .no-result{text-align:center;padding:3rem;color:var(--muted);font-size:13px}

  /* badges */
  .badge{display:inline-block;padding:2px 9px;border-radius:100px;font-size:11px;font-weight:600;letter-spacing:0.03em}
  .b-male{background:var(--blue-dim);color:var(--blue)}
  .b-female{background:var(--pink-dim);color:var(--pink)}
  .b-adult{background:var(--green-dim);color:var(--green)}
  .b-kids{background:var(--amber-dim);color:var(--amber)}
  .b-size{background:#ffffff0d;color:var(--text);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.05em;padding:1px 8px}

  /* footer */
  footer{margin-top:2rem;text-align:center;font-size:11px;color:var(--muted)}
  footer span{color:var(--orange)}

  @media(max-width:600px){
    .charts-row{grid-template-columns:1fr}
    .filter-label{min-width:55px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Perambalur · June 28, 2026</div>
    <h1>Mini Marathon <span>Fest'26</span></h1>
    <div class="subtitle">Registration Report — Live from Google Forms</div>
    <div class="last-update" id="lastUpdate"></div>
  </header>

  <div class="metrics" id="metrics"></div>
  <div class="charts-row" id="charts"></div>

  <div class="filters-wrap">
    <div class="filter-row">
      <span class="filter-label">Gender</span>
      <button class="fbtn on" onclick="setF('gender','All')">All</button>
      <button class="fbtn" onclick="setF('gender','Male')">Male</button>
      <button class="fbtn" onclick="setF('gender','Female')">Female</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">Category</span>
      <button class="fbtn on" onclick="setF('category','All')">All</button>
      <button class="fbtn" onclick="setF('category','Adult')">Adult (4 km)</button>
      <button class="fbtn" onclick="setF('category','Kids')">Kids (2 km)</button>
    </div>
    <div class="filter-row">
      <span class="filter-label">T-Shirt</span>
      <button class="fbtn on" onclick="setF('tshirt','All')">All</button>
      <button class="fbtn" onclick="setF('tshirt','S')">S</button>
      <button class="fbtn" onclick="setF('tshirt','M')">M</button>
      <button class="fbtn" onclick="setF('tshirt','L')">L</button>
      <button class="fbtn" onclick="setF('tshirt','XL')">XL</button>
      <button class="clear-btn" id="clearBtn" style="display:none" onclick="clearFilters()">✕ Clear filters</button>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title">Participants</span>
      <span class="table-count" id="tblCount"></span>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Age</th>
            <th>Gender</th>
            <th>Category</th>
            <th>Distance</th>
            <th>T-Shirt</th>
            <th>Registered</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <footer>Mini Marathon Fest'26 &nbsp;·&nbsp; Perambalur &nbsp;·&nbsp; Powered by <span>786 Spices Group</span></footer>
</div>

<script>
const DATA = [
  {name:"Sample",age:35,gender:"Male",category:"Adult",distance:"4 Km",tshirt:"XL",date:"15 May 2026"},
  {name:"VENKATESAN S",age:41,gender:"Male",category:"Adult",distance:"4 Km",tshirt:"L",date:"16 May 2026"},
  {name:"Manisha K",age:16,gender:"Female",category:"Adult",distance:"4 Km",tshirt:"XL",date:"18 May 2026"},
  {name:"Check Kayal",age:35,gender:"Female",category:"Adult",distance:"4 Km",tshirt:"XL",date:"19 May 2026"},
  {name:"DEVI L",age:25,gender:"Female",category:"Adult",distance:"4 Km",tshirt:"S",date:"23 May 2026"},
  {name:"S. Harish",age:15,gender:"Male",category:"Kids",distance:"2 Km",tshirt:"M",date:"27 May 2026"},
  {name:"S. Harish (2)",age:15,gender:"Male",category:"Kids",distance:"2 Km",tshirt:"M",date:"27 May 2026"},
  {name:"Abimanya A",age:11,gender:"Female",category:"Kids",distance:"2 Km",tshirt:"S",date:"28 May 2026"},
  {name:"V. Srinivasan",age:15,gender:"Male",category:"Kids",distance:"2 Km",tshirt:"M",date:"29 May 2026"},
  {name:"Gayathri",age:40,gender:"Female",category:"Adult",distance:"4 Km",tshirt:"XL",date:"30 May 2026"},
  {name:"S. Dhashika",age:9,gender:"Female",category:"Kids",distance:"2 Km",tshirt:"M",date:"31 May 2026"},
  {name:"S. Vithya",age:31,gender:"Female",category:"Adult",distance:"4 Km",tshirt:"XL",date:"31 May 2026"},
  {name:"U. Manikandan",age:36,gender:"Male",category:"Adult",distance:"4 Km",tshirt:"L",date:"31 May 2026"},
  {name:"YUVAN S",age:12,gender:"Male",category:"Kids",distance:"2 Km",tshirt:"M",date:"31 May 2026"},
];

const SIZES = ["S","M","L","XL"];
const SIZE_COLORS = {S:"#a78bfa",M:"#3de68a",L:"#ffbe3d",XL:"#ff6b35"};
let filters = {gender:"All",category:"All",tshirt:"All"};

document.getElementById("lastUpdate").textContent = "Report generated: " + new Date().toLocaleString('en-SG',{dateStyle:'medium',timeStyle:'short'});

function count(arr, key) {
  return arr.reduce((a,r)=>{a[r[key]]=(a[r[key]]||0)+1;return a;},{});
}

function setF(key, val) {
  filters[key] = val;
  document.querySelectorAll(`.filter-row`).forEach(row=>{
    const label = row.querySelector('.filter-label').textContent.toLowerCase().trim();
    const map = {gender:'gender',category:'category','t-shirt':'tshirt'};
    const k = map[label];
    if(k) row.querySelectorAll('.fbtn').forEach(b=>{
      b.classList.toggle('on', b.textContent.startsWith(filters[k]) || (filters[k]==='All' && b.textContent==='All') || (filters[k]!=='All' && b.textContent.startsWith(filters[k])));
    });
  });
  document.getElementById('clearBtn').style.display =
    (filters.gender!=='All'||filters.category!=='All'||filters.tshirt!=='All') ? '' : 'none';
  render();
}

function clearFilters() {
  filters = {gender:"All",category:"All",tshirt:"All"};
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.filter-row').forEach(row=>{
    const first = row.querySelector('.fbtn');
    if(first) first.classList.add('on');
  });
  document.getElementById('clearBtn').style.display='none';
  render();
}

function render() {
  const d = DATA.filter(r=>
    (filters.gender==='All'||r.gender===filters.gender) &&
    (filters.category==='All'||r.category===filters.category) &&
    (filters.tshirt==='All'||r.tshirt===filters.tshirt)
  );

  const gc = count(d,'gender'), cc = count(d,'category'), tc = count(d,'tshirt');
  const total = d.length;

  // metrics
  const mDefs = [
    {val:total, lbl:'Total', accent:'--orange'},
    {val:gc.Male||0, lbl:'Male', accent:'--blue'},
    {val:gc.Female||0, lbl:'Female', accent:'--pink'},
    {val:cc.Adult||0, lbl:'Adult · 4 km', accent:'--green'},
    {val:cc.Kids||0, lbl:'Kids · 2 km', accent:'--amber'},
  ];
  document.getElementById('metrics').innerHTML = mDefs.map(m=>`
    <div class="metric" style="--accent:var(${m.accent});--accent-dim:var(${m.accent}-dim)">
      <span class="metric-val">${m.val}</span>
      <div class="metric-lbl">${m.lbl}</div>
    </div>`).join('');

  // charts
  const allGC = count(DATA,'gender'), allCC = count(DATA,'category'), allTC = count(DATA,'tshirt');
  const maxG = Math.max(...Object.values(allGC),1);
  const maxC = Math.max(...Object.values(allCC),1);
  const maxT = Math.max(...Object.values(allTC),1);

  const barRows = (items, counts, maxVal, colorFn) => items.map(lbl=>`
    <div class="bar-row">
      <span class="bar-label">${lbl}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round((counts[lbl]||0)/maxVal*100)}%;background:${colorFn(lbl)}"></div></div>
      <span class="bar-count">${counts[lbl]||0}</span>
    </div>`).join('');

  document.getElementById('charts').innerHTML = `
    <div class="chart-card">
      <div class="chart-title">Gender breakdown</div>
      ${barRows(['Male','Female'], gc, maxG, l=>l==='Male'?'#4a9eff':'#ff4d8d')}
    </div>
    <div class="chart-card">
      <div class="chart-title">Category breakdown</div>
      ${barRows(['Adult','Kids'], cc, maxC, l=>l==='Adult'?'#3de68a':'#ffbe3d')}
    </div>
    <div class="chart-card">
      <div class="chart-title">T-shirt size breakdown</div>
      ${barRows(SIZES.filter(s=>allTC[s]), tc, maxT, l=>SIZE_COLORS[l]||'#888')}
    </div>`;

  // table
  document.getElementById('tblCount').textContent = `${total} of ${DATA.length} participants`;
  document.getElementById('tbody').innerHTML = d.length ? d.map((r,i)=>`
    <tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td style="font-weight:500">${r.name}</td>
      <td>${r.age}</td>
      <td><span class="badge ${r.gender==='Male'?'b-male':'b-female'}">${r.gender}</span></td>
      <td><span class="badge ${r.category==='Adult'?'b-adult':'b-kids'}">${r.category}</span></td>
      <td style="color:var(--muted)">${r.distance}</td>
      <td><span class="badge b-size">${r.tshirt}</span></td>
      <td style="color:var(--muted)">${r.date}</td>
    </tr>`).join('') : `<tr><td colspan="8" class="no-result">No participants match the selected filters</td></tr>`;
}

render();
</script>
</body>
</html>
